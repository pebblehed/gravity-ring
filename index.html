<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>GRAVITY RING</title>
<style>
  :root{
    --void:#05060d;
    --void2:#0a0d1c;
    --star:#f3c77d;
    --starcore:#fff3d6;
    --ring:#2b3a63;
    --ship:#eaf6ff;
    --hazard:#ff3d63;
    --orb:#ffd76a;
    --ok:#6fe3c9;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none;}
  html,body{
    margin:0; height:100%; background:var(--void);
    font-family:'Courier New', ui-monospace, monospace;
    overflow:hidden; touch-action:manipulation;
  }
  #stage{
    position:fixed; inset:0;
    display:flex; align-items:center; justify-content:center;
    background:radial-gradient(ellipse at 50% 30%, var(--void2) 0%, var(--void) 70%);
  }
  #frame{
    position:relative;
    width:min(100vw, 56vh);
    height:min(178vw, 100vh);
    max-width:480px; max-height:800px;
  }
  canvas{
    width:100%; height:100%; display:block;
    border-radius:2px;
  }
  .hud{
    position:absolute; top:0; left:0; right:0;
    padding:18px 20px 0 20px;
    display:flex; justify-content:space-between; align-items:flex-start;
    pointer-events:none;
    letter-spacing:1px;
  }
  .hud .label{
    font-size:10px; color:#5c6a94; margin-bottom:2px;
  }
  .hud .score{
    font-size:26px; color:var(--ship); font-weight:bold;
    text-shadow:0 0 12px rgba(234,246,255,0.35);
  }
  .hud .right{ text-align:right; }
  .hud .depth{
    font-size:20px; color:var(--star);
    text-shadow:0 0 10px rgba(243,199,125,0.45);
  }
  .hud .mult{ font-size:12px; color:var(--ok); margin-top:2px; }
  .hint{
    position:absolute; left:0; right:0; top:44%;
    text-align:center; color:#9fb0e0; font-size:12.5px;
    letter-spacing:1.5px; pointer-events:none;
    transition:opacity 0.6s ease;
    text-shadow:0 0 10px rgba(159,176,224,0.5);
    padding:0 30px;
  }
  .overlay{
    position:absolute; inset:0;
    background:rgba(5,6,13,0.86);
    display:flex; align-items:center; justify-content:center;
    flex-direction:column;
    opacity:0; pointer-events:none;
    transition:opacity 0.35s ease;
  }
  .overlay.show{ opacity:1; pointer-events:auto; }
  .overlay h1{
    color:var(--hazard); font-size:20px; letter-spacing:3px;
    margin:0 0 6px 0; text-shadow:0 0 18px rgba(255,61,99,0.6);
    text-align:center;
  }
  .overlay .finalscore{
    color:var(--ship); font-size:44px; font-weight:bold; margin:10px 0 2px 0;
    text-shadow:0 0 16px rgba(234,246,255,0.4);
  }
  .overlay .best{
    color:#8b98c4; font-size:12px; letter-spacing:1px; margin-bottom:26px;
    text-align:center;
  }
  .overlay .best b{ color:var(--orb); }
  .retrybtn{
    background:transparent; border:1px solid var(--ok); color:var(--ok);
    font-family:inherit; letter-spacing:2px; font-size:13px;
    padding:12px 26px; border-radius:30px; cursor:pointer;
    text-shadow:0 0 8px rgba(111,227,201,0.5);
    box-shadow:0 0 14px rgba(111,227,201,0.15) inset;
  }
  .retrybtn:active{ transform:scale(0.96); }
  .title{
    position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:6px;
    background:radial-gradient(ellipse at 50% 40%, rgba(30,20,10,0.2), transparent 60%);
    transition:opacity 0.5s ease;
  }
  .title h1{
    color:var(--star); font-size:28px; letter-spacing:6px; margin:0;
    text-shadow:0 0 24px rgba(243,199,125,0.55);
  }
  .title p{
    color:#8b98c4; font-size:11.5px; letter-spacing:1.5px; margin:0 0 30px 0;
    text-align:center; padding:0 40px;
  }
  .title .tap{
    color:#eaf6ff; font-size:13px; letter-spacing:2px;
    animation:pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse{ 0%,100%{opacity:0.35;} 50%{opacity:1;} }

  .controls{
    position:absolute; left:0; right:0; bottom:22px;
    display:flex; justify-content:space-between;
    padding:0 24px;
    pointer-events:none;
  }
  .ctrlBtn{
    pointer-events:auto;
    width:84px; height:84px; border-radius:50%;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:rgba(20,26,48,0.55);
    border:1.5px solid rgba(111,227,201,0.35);
    backdrop-filter:blur(3px);
    color:#eaf6ff;
    font-family:inherit;
    box-shadow:0 0 20px rgba(0,0,0,0.35);
    transition:transform 0.08s ease, background 0.15s ease, border-color 0.15s ease;
  }
  .ctrlBtn .arrow{ font-size:22px; line-height:1; margin-bottom:3px; }
  .ctrlBtn .lbl{ font-size:10px; letter-spacing:2px; color:#9fb0e0; }
  .ctrlBtn:active, .ctrlBtn.pressed{
    transform:scale(0.9);
    background:rgba(111,227,201,0.18);
    border-color:var(--ok);
  }
  #outBtn .arrow{ color:var(--star); }
  #inBtn .arrow{ color:var(--ok); }

  .practice{
    position:absolute; left:0; right:0; top:82px;
    text-align:center; pointer-events:none;
    font-size:10.5px; letter-spacing:2px; color:var(--star);
    text-shadow:0 0 8px rgba(243,199,125,0.5);
    opacity:0; transition:opacity 0.4s ease;
  }
  .practice.show{ opacity:1; }
</style>
</head>
<body>
<div id="stage">
  <div id="frame">
    <canvas id="c"></canvas>

    <div class="hud">
      <div>
        <div class="label">SCORE</div>
        <div class="score" id="scoreEl">0</div>
      </div>
      <div class="right">
        <div class="label">DEPTH</div>
        <div class="depth" id="depthEl">1</div>
        <div class="mult" id="multEl">x1.0</div>
      </div>
    </div>

    <div class="hint" id="hintEl">IN dives toward the star &middot; OUT retreats &middot; reach the core to descend deeper</div>
    <div class="practice" id="practiceEl"></div>

    <div class="title" id="titleEl">
      <h1>GRAVITY RING</h1>
      <p>dive through the rings, dodge the storm arcs,<br>reach the core &mdash; then do it again, deeper</p>
      <div class="tap">TAP ANYWHERE TO BEGIN</div>
    </div>

    <div class="overlay" id="overEl">
      <h1>DRIFTED INTO THE STORM</h1>
      <div class="finalscore" id="finalScoreEl">0</div>
      <div class="best">BEST SCORE&nbsp; <b id="bestEl">0</b> &middot; DEEPEST DIVE&nbsp; <b id="bestDepthEl">1</b></div>
      <button class="retrybtn" id="retryBtn">TAP TO RETRY</button>
    </div>

    <div class="controls">
      <button class="ctrlBtn" id="inBtn">
        <div class="arrow">&#9660;</div>
        <div class="lbl">IN</div>
      </button>
      <button class="ctrlBtn" id="outBtn">
        <div class="arrow">&#9650;</div>
        <div class="lbl">OUT</div>
      </button>
    </div>
  </div>
</div>

<script>
(function(){
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const frame = document.getElementById('frame');
  const scoreEl = document.getElementById('scoreEl');
  const depthEl = document.getElementById('depthEl');
  const multEl = document.getElementById('multEl');
  const hintEl = document.getElementById('hintEl');
  const practiceEl = document.getElementById('practiceEl');
  const titleEl = document.getElementById('titleEl');
  const overEl = document.getElementById('overEl');
  const finalScoreEl = document.getElementById('finalScoreEl');
  const bestEl = document.getElementById('bestEl');
  const bestDepthEl = document.getElementById('bestDepthEl');
  const retryBtn = document.getElementById('retryBtn');
  const inBtn = document.getElementById('inBtn');
  const outBtn = document.getElementById('outBtn');

  const LW = 480, LH = 800;
  let cx = LW/2, cy = 400;

  function resize(){
    const dpr = Math.min(window.devicePixelRatio || 1, 2.5);
    const rect = frame.getBoundingClientRect();
    canvas.width = Math.round(rect.width * dpr);
    canvas.height = Math.round(rect.height * dpr);
    ctx.setTransform(dpr * (rect.width/LW), 0, 0, dpr * (rect.height/LH), 0, 0);
  }
  window.addEventListener('resize', resize);

  // ================= AUDIO =================
  // Master bus with a lightweight delay-based "reverb" send so every sound
  // has a bit of air/space (the ASMR feel), plus a continuous deep drone.
  let actx = null, masterGain, dryGain, reverbDelay, reverbFilter, reverbFeedback, reverbWet;
  let droneStarted = false, droneGain;

  function ensureAudio(){
    if(actx) return;
    try{
      actx = new (window.AudioContext||window.webkitAudioContext)();
      masterGain = actx.createGain(); masterGain.gain.value = 0.9; masterGain.connect(actx.destination);
      dryGain = actx.createGain(); dryGain.gain.value = 1; dryGain.connect(masterGain);

      reverbDelay = actx.createDelay(1.2); reverbDelay.delayTime.value = 0.24;
      reverbFilter = actx.createBiquadFilter(); reverbFilter.type = 'lowpass'; reverbFilter.frequency.value = 1600;
      reverbFeedback = actx.createGain(); reverbFeedback.gain.value = 0.34;
      reverbWet = actx.createGain(); reverbWet.gain.value = 0.55;
      reverbDelay.connect(reverbFilter);
      reverbFilter.connect(reverbFeedback);
      reverbFeedback.connect(reverbDelay);
      reverbDelay.connect(reverbWet);
      reverbWet.connect(masterGain);
    }catch(e){}
  }

  function beep(freq, dur, type, gain, delay){
    if(!actx) return;
    const t0 = actx.currentTime + (delay||0);
    const o = actx.createOscillator();
    const g = actx.createGain();
    o.type = type || 'sine';
    o.frequency.setValueAtTime(freq, t0);
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(gain||0.12, t0+0.008);
    g.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
    o.connect(g);
    g.connect(dryGain);
    g.connect(reverbDelay);
    o.start(t0); o.stop(t0+dur+0.02);
  }

  function makeNoiseBuffer(dur){
    const sr = actx.sampleRate;
    const buf = actx.createBuffer(1, Math.max(1, Math.floor(sr*dur)), sr);
    const data = buf.getChannelData(0);
    for(let i=0;i<data.length;i++){ data[i] = (Math.random()*2-1) * Math.pow(1-i/data.length, 1.4); }
    return buf;
  }
  function noiseBurst(dur, gain, filterFreq, filterType){
    if(!actx) return;
    const buf = makeNoiseBuffer(dur);
    const src = actx.createBufferSource(); src.buffer = buf;
    const filt = actx.createBiquadFilter(); filt.type = filterType||'lowpass'; filt.frequency.value = filterFreq||800;
    const g = actx.createGain(); g.gain.value = gain||0.2;
    src.connect(filt); filt.connect(g); g.connect(dryGain); g.connect(reverbDelay);
    src.start();
  }

  function startDrone(){
    if(droneStarted || !actx) return;
    droneStarted = true;

    droneGain = actx.createGain(); droneGain.gain.value = 0;
    droneGain.connect(masterGain);
    droneGain.gain.linearRampToValueAtTime(0.055, actx.currentTime + 3.2);

    const filt = actx.createBiquadFilter(); filt.type = 'lowpass'; filt.frequency.value = 210; filt.Q.value = 1.1;
    filt.connect(droneGain);

    const o1 = actx.createOscillator(); o1.type = 'sine'; o1.frequency.value = 46;
    const o2 = actx.createOscillator(); o2.type = 'sine'; o2.frequency.value = 46*1.006;
    const sub = actx.createOscillator(); sub.type = 'sine'; sub.frequency.value = 23;
    o1.connect(filt); o2.connect(filt); sub.connect(filt);

    const lfo = actx.createOscillator(); lfo.type = 'sine'; lfo.frequency.value = 0.05;
    const lfoGain = actx.createGain(); lfoGain.gain.value = 65;
    lfo.connect(lfoGain); lfoGain.connect(filt.frequency);

    const lfo2 = actx.createOscillator(); lfo2.type = 'sine'; lfo2.frequency.value = 0.018;
    const lfo2Gain = actx.createGain(); lfo2Gain.gain.value = 3;
    lfo2.connect(lfo2Gain); lfo2Gain.connect(o2.detune);

    [o1,o2,sub,lfo,lfo2].forEach(o=>o.start());
  }

  const sfx = {
    move:()=>beep(480,0.08,'square',0.06),
    blocked:()=>beep(220,0.09,'square',0.05),
    graze:(m)=>beep(700+m*40,0.12,'sine',0.10),
    orb:()=>{ beep(880,0.10,'triangle',0.11); beep(1175,0.11,'triangle',0.11,0.05); beep(1568,0.16,'triangle',0.12,0.10); },
    coreRise:()=>{
      if(!actx) return;
      const t0 = actx.currentTime;
      const o = actx.createOscillator(); o.type = 'sawtooth';
      const g = actx.createGain();
      const filt = actx.createBiquadFilter(); filt.type = 'bandpass'; filt.frequency.value = 600; filt.Q.value = 0.7;
      o.frequency.setValueAtTime(140, t0);
      o.frequency.exponentialRampToValueAtTime(900, t0+0.5);
      g.gain.setValueAtTime(0, t0);
      g.gain.linearRampToValueAtTime(0.09, t0+0.05);
      g.gain.linearRampToValueAtTime(0.0001, t0+0.55);
      o.connect(filt); filt.connect(g); g.connect(dryGain); g.connect(reverbDelay);
      o.start(t0); o.stop(t0+0.6);
    },
    coreBoom:()=>{
      noiseBurst(0.6, 0.22, 500, 'lowpass');
      beep(70,0.6,'sine',0.2);
      beep(46,0.7,'sine',0.16,0.03);
    },
    orbBoom:()=>{
      noiseBurst(0.3, 0.14, 1400, 'bandpass');
      beep(520,0.22,'sine',0.11);
      beep(760,0.18,'triangle',0.1,0.05);
    },
    death:()=>{ beep(160,0.5,'sawtooth',0.15); beep(90,0.6,'sawtooth',0.12); noiseBurst(0.4,0.14,900,'lowpass'); }
  };

  function primeAudio(){
    ensureAudio();
    if(actx && actx.state === 'suspended') actx.resume();
    startDrone();
  }

  // ================= MATH HELPERS =================
  const TAU = Math.PI*2;
  function norm01(a){ a = a % TAU; if(a<0) a += TAU; return a; }
  function normSigned(a){ a = a % TAU; if(a>Math.PI) a -= TAU; if(a<-Math.PI) a += TAU; return a; }
  function easeOutCubic(p){ return 1 - Math.pow(1-p, 3); }

  // ================= HAZARD COLOR PALETTE =================
  // Obstacles change color with each descent, cycling through this palette.
  const HAZARD_PALETTE = ['#ff3d63', '#c774ff', '#ff9d4d', '#4dd2ff', '#ff4de3', '#8fff6b'];
  function hazardColor(forDepth){
    const d = forDepth || depth;
    return HAZARD_PALETTE[(d-1) % HAZARD_PALETTE.length];
  }

  // ================= RING / HAZARD CONFIG =================
  // ringIndex 0 = innermost (closest to the star / the core), last index = outermost (starting edge)
  function makeRings(){
    return [
      { radius:60,  baseSpeed: 0.55, hazards:[{base:0.0, width:0.85}] },
      { radius:100, baseSpeed:-0.70, hazards:[{base:1.6, width:0.75}] },
      { radius:140, baseSpeed: 0.85, hazards:[{base:0.3, width:0.62},{base:3.5, width:0.55}] },
      { radius:180, baseSpeed:-0.95, hazards:[{base:2.1, width:0.58},{base:5.0, width:0.5}] },
      { radius:220, baseSpeed: 1.15, hazards:[{base:0.8, width:0.5},{base:2.9, width:0.45},{base:4.8, width:0.45}] },
    ];
  }

  const GRAZE_THRESH = 0.14;
  const ORB_THRESH = 0.09;
  const SHIP_SPEED = 1.35;
  const LEARNING_RUNS = 3; // first N attempts this session run at reduced speed

  let rings, ringIndex, shipAngle, shipRadius;
  let score, best = 0, bestDepth = 1, multiplier;
  let particles, trail, ripples;
  let orb;
  let t, depth, difficulty;
  let hazardTime = 0; // advances only while NOT shielded, so hazards fully freeze during spawn invulnerability
  let state;
  let shakeT = 0;
  let coreFlashT = 0;      // text fade timer
  let coreFillT = 0, coreFillMax = 0.55, coreExploded = false; // screen-filling glow sequence
  let flashGrowDur = 0.24, flashLabel = null, flashSecondaryRgb = '255,215,106', flashBig = true;
  let grazedFlags;
  let totalRuns = 0;
  let isLearningRun = false;
  let speedScale = 1;
  let shipSpeedCur = SHIP_SPEED;
  let invulnT = 0;

  function ringHazardKey(ri, hi){ return ri+'_'+hi; }

  function newOrb(){
    const ri = Math.floor(Math.random()*4);
    return { ring: ri, angle: Math.random()*TAU, phase: Math.random()*10 };
  }

  function hazardState(ring, hz){
    const speed = ring.baseSpeed * difficulty * speedScale;
    const widthMult = isLearningRun ? 1 : Math.min(1.3, 1 + (depth-1)*0.025);
    const start = norm01(hz.base + speed*hazardTime);
    return { start, width: hz.width * widthMult };
  }

  // Re-bases a ring's hazards so that, at this instant, the forward gap between
  // the ship's angle and each hazard is at least `requiredGap` radians. Only
  // the forward direction matters (that's the only way the ship can ever
  // reach a hazard), so this is a one-sided check, not a symmetric band.
  function placeSafeHazards(ringIdx, angle, requiredGap){
    const ring = rings[ringIdx];
    const speed = ring.baseSpeed * difficulty * speedScale;
    ring.hazards.forEach(h => {
      let startTarget;
      do { startTarget = Math.random()*TAU; }
      while(norm01(startTarget - angle) < requiredGap);
      h.base = norm01(startTarget - speed*hazardTime);
    });
  }

  function resetGame(){
    rings = makeRings();
    ringIndex = rings.length - 1;
    shipAngle = -Math.PI/2;
    score = 0;
    multiplier = 1;
    particles = [];
    trail = [];
    ripples = [];
    orb = newOrb();
    t = 0;
    hazardTime = 0;
    depth = 1;
    difficulty = 1;
    grazedFlags = {};
    shakeT = 0;
    coreFlashT = 0;
    coreFillT = 0;
    coreExploded = false;
    invulnT = 0.6;
    { const requiredGap = shipSpeedCur * invulnT + 0.3;
      for(let i=0;i<rings.length;i++) placeSafeHazards(i, shipAngle, requiredGap); }
  }

  function spawnBurst(x, y, n, color, speed){
    for(let i=0;i<n;i++){
      const a = Math.random()*TAU;
      const sp = (speed||70) * (0.5+Math.random());
      particles.push({ x, y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp, life:0.4+Math.random()*0.3, maxLife:0.7, color, size: 2+Math.random()*1.6 });
    }
  }

  function spawnRipple(x, y, maxR, color, duration, lineWidth){
    ripples.push({ x, y, maxR, duration, life: duration, color, lineWidth });
  }

  // Full-screen glow -> peak glare -> detonation -> shockwave sequence.
  // Used for both the small orb pickup (fast, no label) and reaching the
  // core (slower, bigger, labelled "CORE REACHED").
  function triggerFlash(opts){
    coreFillMax = opts.duration;
    coreFillT = opts.duration;
    coreExploded = false;
    flashGrowDur = opts.growDur;
    flashLabel = opts.label || null;
    flashSecondaryRgb = opts.secondaryColorRgb;
    flashBig = !!opts.big;
    coreFlashT = flashLabel ? 1.4 : 0;
  }

  function moveIn(){
    if(state === 'title'){ startGame(); return; }
    if(state !== 'playing') return;
    if(ringIndex === 0){ coreReach(); return; }
    ringIndex--;
    sfx.move();
    spawnBurst(cx+shipRadius*Math.cos(shipAngle), cy+shipRadius*Math.sin(shipAngle), 8, '234,246,255', 70);
  }

  function moveOut(){
    if(state === 'title'){ startGame(); return; }
    if(state !== 'playing') return;
    if(ringIndex >= rings.length-1){ sfx.blocked(); return; }
    ringIndex++;
    sfx.move();
    spawnBurst(cx+shipRadius*Math.cos(shipAngle), cy+shipRadius*Math.sin(shipAngle), 8, '111,227,201', 70);
  }

  function coreReach(){
    score += 150 * multiplier + depth*15;
    multiplier = Math.min(6, multiplier + 0.4);
    depth++;
    bestDepth = Math.max(bestDepth, depth);

    coreFlashT = 0; // set by triggerFlash below
    sfx.coreRise();
    triggerFlash({ duration:0.55, growDur:0.24, label:'CORE REACHED', secondaryColorRgb: hexToRgb(hazardColor()), big:true });

    if(droneGain && actx){
      droneGain.gain.linearRampToValueAtTime(Math.min(0.09, 0.055 + depth*0.003), actx.currentTime + 0.4);
    }

    // reshuffle hazards for the new descent (hidden behind the screen-filling glow)
    rings.forEach(r => r.hazards.forEach(h => { h.base = Math.random()*TAU; }));
    ringIndex = rings.length - 1;
    invulnT = 0.5;
    { const requiredGap = shipSpeedCur * invulnT + 0.3;
      for(let i=0;i<rings.length;i++) placeSafeHazards(i, shipAngle, requiredGap); }
    orb = newOrb();
  }

  function startGame(){
    totalRuns++;
    isLearningRun = totalRuns <= LEARNING_RUNS;
    speedScale = isLearningRun ? 0.32 : 1;
    shipSpeedCur = isLearningRun ? SHIP_SPEED * 0.55 : SHIP_SPEED;

    resetGame();
    state = 'playing';
    titleEl.style.opacity = 0;
    titleEl.style.pointerEvents = 'none';
    overEl.classList.remove('show');
    hintEl.style.opacity = 1;
    setTimeout(()=>{ if(state==='playing') hintEl.style.opacity = 0; }, 3600);

    if(isLearningRun){
      practiceEl.textContent = `PRACTICE RUN ${totalRuns} / ${LEARNING_RUNS} \u00b7 SLOW SPEED`;
      practiceEl.classList.add('show');
    } else {
      practiceEl.classList.remove('show');
    }
  }

  function die(){
    if(state !== 'playing') return;
    state = 'dead';
    sfx.death();
    shakeT = 0.4;
    best = Math.max(best, Math.round(score));
    finalScoreEl.textContent = Math.round(score);
    bestEl.textContent = best;
    bestDepthEl.textContent = bestDepth;
    spawnBurst(cx+shipRadius*Math.cos(shipAngle), cy+shipRadius*Math.sin(shipAngle), 28, '255,61,99', 150);
    setTimeout(()=>overEl.classList.add('show'), 250);
  }

  // ================= UPDATE =================
  function update(dt){
    t += dt;
    difficulty = Math.min(3.2, 1 + (depth-1)*0.16 + t*0.003);

    if(state === 'playing'){
      shipAngle = norm01(shipAngle + shipSpeedCur*dt);
      shipRadius = rings[ringIndex].radius;

      if(invulnT > 0) invulnT = Math.max(0, invulnT - dt);
      if(invulnT <= 0) hazardTime += dt;

      score += dt * 2.2 * multiplier;
      multiplier += (1 - multiplier) * dt * 0.18;

      const ring = rings[ringIndex];
      ring.hazards.forEach((hz, hi) => {
        const { start, width } = hazardState(ring, hz);
        const rel = norm01(shipAngle - start);
        const key = ringHazardKey(ringIndex, hi);

        if(invulnT > 0) return; // spawn shield: no collision or graze checks yet

        if(rel < width){ die(); return; }

        const d1 = Math.abs(normSigned(shipAngle - start));
        const d2 = Math.abs(normSigned(shipAngle - (start+width)));
        const dMin = Math.min(d1, d2);
        if(dMin < GRAZE_THRESH){
          if(!grazedFlags[key]){
            grazedFlags[key] = true;
            multiplier = Math.min(6, multiplier + 0.28);
            score += 8 * multiplier;
            sfx.graze(multiplier);
          }
        } else if(dMin > GRAZE_THRESH*2.2){
          grazedFlags[key] = false;
        }
      });

      if(orb && orb.ring === ringIndex){
        const d = Math.abs(normSigned(shipAngle - orb.angle));
        if(d < ORB_THRESH){
          score += 25 * multiplier;
          multiplier = Math.min(6, multiplier + 0.15);
          sfx.orb();
          const ox2 = cx+rings[orb.ring].radius*Math.cos(orb.angle);
          const oy2 = cy+rings[orb.ring].radius*Math.sin(orb.angle);
          spawnBurst(ox2, oy2, 16, '255,215,106', 100);
          triggerFlash({ duration:0.4, growDur:0.16, label:null, secondaryColorRgb:'255,215,106', big:false });
          orb = newOrb();
        }
      }

      trail.push({x: cx+shipRadius*Math.cos(shipAngle), y: cy+shipRadius*Math.sin(shipAngle), life:0.25});
      if(trail.length > 18) trail.shift();

      scoreEl.textContent = Math.round(score);
      depthEl.textContent = depth;
      multEl.textContent = 'x' + multiplier.toFixed(1);
    }

    // screen-filling glow sequence: grow, hold/peak, then explode + fade
    if(coreFillT > 0){
      coreFillT = Math.max(0, coreFillT - dt);
      const elapsed = coreFillMax - coreFillT;
      if(!coreExploded && elapsed >= flashGrowDur){
        coreExploded = true;
        const burstN = flashBig ? 46 : 24;
        const r1 = flashBig ? 520 : 320;
        const r2 = flashBig ? 640 : 440;
        const d1 = flashBig ? 1.0 : 0.7;
        const d2 = flashBig ? 1.3 : 0.95;
        spawnRipple(cx, cy, r1, '255,243,214', d1, flashBig?4:3);
        spawnRipple(cx, cy, r2, flashSecondaryRgb, d2, flashBig?3:2);
        spawnBurst(cx, cy, burstN, '255,243,214', flashBig?190:150);
        if(flashBig) sfx.coreBoom(); else sfx.orbBoom();
      }
    }

    particles.forEach(p=>{ p.x+=p.vx*dt; p.y+=p.vy*dt; p.vx*=0.92; p.vy*=0.92; p.life-=dt; });
    particles = particles.filter(p=>p.life>0);
    trail.forEach(p=>p.life-=dt);
    trail = trail.filter(p=>p.life>0);
    ripples.forEach(r=>r.life-=dt);
    ripples = ripples.filter(r=>r.life>0);
    if(shakeT>0) shakeT = Math.max(0, shakeT-dt);
    if(coreFlashT>0) coreFlashT = Math.max(0, coreFlashT-dt);
  }

  function hexToRgb(hex){
    const v = hex.replace('#','');
    const n = parseInt(v,16);
    return `${(n>>16)&255},${(n>>8)&255},${n&255}`;
  }

  // ================= DRAW =================
  function draw(){
    ctx.clearRect(0,0,LW,LH);

    let ox=0, oy=0;
    if(shakeT>0){
      const m = shakeT*40;
      ox = (Math.random()-0.5)*m; oy = (Math.random()-0.5)*m;
    }
    ctx.save();
    ctx.translate(ox,oy);

    ctx.fillStyle = '#05060d';
    ctx.fillRect(-20,-20,LW+40,LH+40);
    ctx.save();
    ctx.globalAlpha = 0.5;
    for(let i=0;i<40;i++){
      const sx = (i*97 % LW), sy = (i*53 % LH);
      const tw = 0.5+0.5*Math.sin(t*2 + i);
      ctx.fillStyle = `rgba(180,195,230,${0.15+0.25*tw})`;
      ctx.fillRect(sx, sy, 1.4, 1.4);
    }
    ctx.restore();

    // ambient color wash tied to the current level's obstacle color
    ctx.save();
    ctx.globalAlpha = 0.05 + 0.02*Math.sin(t*0.4);
    ctx.fillStyle = hazardColor();
    ctx.fillRect(0,0,LW,LH);
    ctx.restore();

    const pulse = 1 + 0.04*Math.sin(t*1.6) + (coreFlashT>0 ? coreFlashT*0.5 : 0);
    const grad = ctx.createRadialGradient(cx,cy,0, cx,cy, 46*pulse);
    grad.addColorStop(0, '#fff3d6');
    grad.addColorStop(0.35, '#f3c77d');
    grad.addColorStop(1, 'rgba(243,199,125,0)');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(cx,cy,46*pulse,0,TAU); ctx.fill();
    ctx.fillStyle = '#fff8e8';
    ctx.beginPath(); ctx.arc(cx,cy,14,0,TAU); ctx.fill();

    const hCol = hazardColor();
    rings.forEach((ring, ri) => {
      ctx.beginPath();
      ctx.arc(cx,cy,ring.radius,0,TAU);
      ctx.strokeStyle = ri===ringIndex ? 'rgba(111,227,201,0.28)' : 'rgba(43,58,99,0.55)';
      ctx.lineWidth = ri===ringIndex ? 2 : 1;
      ctx.stroke();

      ring.hazards.forEach(hz => {
        const { start, width } = hazardState(ring, hz);
        ctx.beginPath();
        ctx.arc(cx,cy,ring.radius,start,start+width);
        ctx.lineWidth = 13;
        ctx.strokeStyle = hCol;
        ctx.shadowColor = hCol;
        ctx.shadowBlur = 16;
        ctx.stroke();
        ctx.shadowBlur = 0;
      });
    });

    if(orb){
      const r = rings[orb.ring].radius;
      const ox2 = cx + r*Math.cos(orb.angle);
      const oy2 = cy + r*Math.sin(orb.angle);
      const s = 5 + 1.6*Math.sin(t*5 + orb.phase);
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      ctx.beginPath();
      ctx.arc(ox2,oy2, s+7, 0, TAU);
      ctx.fillStyle = 'rgba(255,215,106,0.22)';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(ox2,oy2, s, 0, TAU);
      ctx.fillStyle = '#ffd76a';
      ctx.shadowColor = '#ffd76a';
      ctx.shadowBlur = 14;
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.restore();
    }

    trail.forEach(p=>{
      ctx.globalAlpha = (p.life/0.25) * 0.5;
      ctx.beginPath();
      ctx.arc(p.x,p.y, 3, 0, TAU);
      ctx.fillStyle = '#eaf6ff';
      ctx.fill();
    });
    ctx.globalAlpha = 1;

    if(state !== 'title'){
      const sx = cx + shipRadius*Math.cos(shipAngle);
      const sy = cy + shipRadius*Math.sin(shipAngle);
      const heading = shipAngle + Math.PI/2;

      if(state === 'playing' && invulnT > 0){
        const sAlpha = Math.min(1, invulnT/0.5);
        ctx.beginPath();
        ctx.arc(sx, sy, 19 + Math.sin(t*10)*1.5, 0, TAU);
        ctx.strokeStyle = `rgba(111,227,201,${0.55*sAlpha})`;
        ctx.lineWidth = 2;
        ctx.shadowColor = '#6fe3c9';
        ctx.shadowBlur = 10;
        ctx.stroke();
        ctx.shadowBlur = 0;
      }

      ctx.save();
      ctx.translate(sx,sy);
      ctx.rotate(heading);
      ctx.beginPath();
      ctx.arc(0,0,14,0,TAU);
      ctx.fillStyle = 'rgba(234,246,255,0.12)';
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(0,-9);
      ctx.lineTo(6,7);
      ctx.lineTo(0,3.5);
      ctx.lineTo(-6,7);
      ctx.closePath();
      ctx.fillStyle = '#eaf6ff';
      ctx.shadowColor = '#eaf6ff';
      ctx.shadowBlur = 10;
      ctx.fill();
      ctx.restore();
    }

    // glowing particles, additive blend
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    particles.forEach(p=>{
      const a = Math.max(0, p.life/p.maxLife);
      const r = (p.size||2.4) * (0.6+0.4*a) * 2.6;
      const g2 = ctx.createRadialGradient(p.x,p.y,0, p.x,p.y, r);
      g2.addColorStop(0, `rgba(${p.color},${a})`);
      g2.addColorStop(1, `rgba(${p.color},0)`);
      ctx.fillStyle = g2;
      ctx.beginPath(); ctx.arc(p.x,p.y,r,0,TAU); ctx.fill();
    });
    ctx.restore();

    // concentric ripples
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ripples.forEach(r=>{
      const p = 1 - r.life/r.duration;
      const rad = r.maxR * easeOutCubic(p);
      const alpha = (1-p) * 0.75;
      ctx.beginPath();
      ctx.arc(r.x, r.y, rad, 0, TAU);
      ctx.strokeStyle = `rgba(${r.color},${alpha})`;
      ctx.lineWidth = r.lineWidth * (1 - p*0.5);
      ctx.shadowColor = `rgba(${r.color},1)`;
      ctx.shadowBlur = 14;
      ctx.stroke();
      ctx.shadowBlur = 0;
    });
    ctx.restore();

    // screen-filling glow (grow, peak, fade) — shared by orb pickup and core reach
    if(coreFillT > 0){
      const elapsed = coreFillMax - coreFillT;
      const growDur = flashGrowDur;
      const peakAlpha = flashBig ? 0.92 : 0.8;
      let alpha, radius;
      const maxR = Math.max(LW,LH) * 0.85;
      if(elapsed < growDur){
        const p = elapsed / growDur;
        radius = p * maxR;
        alpha = p * peakAlpha;
      } else {
        const p = Math.min(1, (elapsed-growDur) / (coreFillMax-growDur));
        radius = maxR;
        alpha = (1-p) * peakAlpha;
      }
      const g3 = ctx.createRadialGradient(cx,cy,0, cx,cy, radius);
      g3.addColorStop(0, `rgba(255,243,214,${alpha})`);
      g3.addColorStop(0.55, `rgba(243,199,125,${alpha*0.85})`);
      g3.addColorStop(1, `rgba(243,199,125,0)`);
      ctx.fillStyle = g3;
      ctx.fillRect(0,0,LW,LH);
    }

    if(coreFlashT > 0 && flashLabel){
      ctx.globalAlpha = Math.min(1, coreFlashT/0.5);
      ctx.font = 'bold 22px Courier New, monospace';
      ctx.textAlign = 'center';
      ctx.fillStyle = '#fff3d6';
      ctx.shadowColor = '#f3c77d';
      ctx.shadowBlur = 18;
      ctx.fillText(flashLabel, cx, cy - 70);
      ctx.shadowBlur = 0;
      ctx.globalAlpha = 1;
    }

    ctx.restore();
  }

  let last = performance.now();
  function loop(now){
    const dt = Math.min(0.033, (now-last)/1000);
    last = now;
    update(dt);
    draw();
    requestAnimationFrame(loop);
  }

  frame.addEventListener('pointerdown', (e)=>{
    primeAudio();
    if(state === 'title') startGame();
  });

  inBtn.addEventListener('pointerdown', (e)=>{ e.stopPropagation(); primeAudio(); moveIn(); });
  outBtn.addEventListener('pointerdown', (e)=>{ e.stopPropagation(); primeAudio(); moveOut(); });

  window.addEventListener('keydown', (e)=>{
    if(e.code === 'ArrowDown' || e.code === 'KeyS'){ primeAudio(); moveIn(); }
    if(e.code === 'ArrowUp' || e.code === 'KeyW' || e.code === 'Space'){ primeAudio(); moveOut(); }
  });

  retryBtn.addEventListener('pointerdown', (e)=>{
    e.stopPropagation();
    primeAudio();
    overEl.classList.remove('show');
    startGame();
  });

  state = 'title';
  resetGame();
  shipRadius = rings[ringIndex].radius;
  resize();
  requestAnimationFrame((n)=>{ last=n; requestAnimationFrame(loop); });
})();
</script>
</body>
